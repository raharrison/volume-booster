name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Package extension
        run: cd src && zip -r ../volume-booster.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: volume-booster.zip
