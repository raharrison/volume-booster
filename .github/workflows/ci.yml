name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate manifest.json
        run: |
          test -f src/manifest.json
          jq empty src/manifest.json

      - name: Check JS syntax
        run: |
          for file in $(find src -name "*.js"); do
            node --check "$file"
          done
